<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上海马拉松：对对碰 (Ceremony Edition)</title>
    <style>
        :root {
            --neon-green: #CCFF00;
            --deep-blue: #0A0E14;
            --white: #FFFFFF;
            --gray: #252930;
            --gold: #FFD700;
            --danger: #FF3300;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Ma+Shan+Zheng&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--deep-blue);
            color: var(--white);
            font-family: 'Inter', 'PingFang SC', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        #dashboard {
            width: 100%;
            max-width: 600px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .stat-group { display: flex; flex-direction: column; }
        .stat-label { font-size: 10px; color: var(--neon-green); font-weight: 800; letter-spacing: 1px; }
        .stat-value { font-size: 24px; font-weight: 900; font-family: 'Orbitron', sans-serif; }

        #game-container {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { display: block; touch-action: none; cursor: pointer; }

        #toolbox {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 20;
        }

        .tool-item {
            width: 55px; height: 55px;
            background: rgba(37, 41, 48, 0.9);
            border: 2px solid #444;
            border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.2s; position: relative;
        }
        .tool-item:active { transform: scale(0.9) translateY(5px); }
        .tool-count { position: absolute; top: -8px; right: -8px; background: var(--danger); color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 900; border: 2px solid var(--deep-blue); }

        /* 电子证书结算页面 */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 14, 20, 0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center;
            padding: 20px;
        }

        #certificate {
            background: linear-gradient(135deg, #1a1e26 0%, #0a0e14 100%);
            border: 2px solid var(--gold);
            padding: 40px 30px;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
            max-width: 400px;
            width: 90%;
            animation: certSlide 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes certSlide {
            from { transform: translateY(50px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        #cert-medal {
            font-size: 80px; margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 20px var(--gold));
            animation: medalBounce 1s infinite alternate cubic-bezier(0.455, 0.03, 0.515, 0.955);
        }

        @keyframes medalBounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        #overlay h2 { 
            font-family: 'Ma Shan Zheng', cursive; 
            font-size: 36px; color: var(--gold); margin-bottom: 10px; 
        }

        .summary { margin-bottom: 30px; color: #ccc; font-size: 14px; border-top: 1px solid #333; padding-top: 20px; }
        .summary p { margin: 10px 0; }
        .summary b { color: var(--white); font-family: 'Orbitron', sans-serif; font-size: 22px; margin-left: 10px; }

        .btn {
            padding: 15px 40px;
            background: var(--neon-green);
            color: var(--deep-blue);
            font-weight: 900; border: none; border-radius: 2px;
            cursor: pointer; font-size: 18px; text-transform: uppercase;
            letter-spacing: 2px; transition: all 0.2s;
        }
        .btn:hover { background: var(--white); box-shadow: 0 0 20px var(--neon-green); }

        #progress-wrapper { width: 90%; height: 6px; background: #111; margin-bottom: 10px; position: relative; border-radius: 3px; }
        #progress-bar { position: absolute; height: 100%; background: var(--neon-green); width: 0%; transition: width 0.4s; box-shadow: 0 0 10px var(--neon-green); }
        #stage-name { font-size: 14px; color: var(--neon-green); letter-spacing: 2px; margin-bottom: 20px; font-weight: bold; }

    </style>
</head>
<body>

    <div id="dashboard">
        <div class="stat-group">
            <div class="stat-label">FINISH KM</div>
            <div class="stat-value"><span id="score">0.000</span></div>
        </div>
        <div class="stat-group" style="align-items: flex-end;">
            <div class="stat-label">CLOCK</div>
            <div class="stat-value" id="timer">08:00</div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="toolbox">
            <div class="tool-item" onclick="game.useGel()" title="清除⏱️">
                <div class="tool-count" id="count-gel">10</div>
                <span style="font-size:20px">💊</span>
            </div>
            <div class="tool-item" onclick="game.useGPS()" title="提示">
                <div class="tool-count" id="count-gps">10</div>
                <span style="font-size:20px">🎯</span>
            </div>
            <div class="tool-item" onclick="game.useShuffle()" title="洗牌">
                <div class="tool-count" id="count-shuffle">99</div>
                <span style="font-size:20px">🌪️</span>
            </div>
        </div>

        <div id="overlay">
            <div id="certificate">
                <div id="cert-medal">🏅</div>
                <h2 id="overlay-title">完赛证书</h2>
                <div id="overlay-msg" class="summary">
                    <p>恭喜您完成 2026 上海马拉松挑战！</p>
                    <p>成绩 (Gun Time)：<b id="final-time">00:00</b></p>
                    <p>总里程 (Distance)：<b id="final-dist">42.195 KM</b></p>
                </div>
                <button class="btn" onclick="game.start()" id="start-btn">再次挑战</button>
            </div>
        </div>
    </div>

    <div id="progress-wrapper"><div id="progress-bar"></div></div>
    <div id="stage-name">当前赛段：外滩段</div>

    <script>
        const CONFIG = {
            COLORS: {
                neon: '#CCFF00', deep: '#0A0E14', white: '#FFFFFF', gold: '#FFD700',
                confetti: ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4caf50', '#8bc34a', '#cddc39', '#ffeb3b', '#ffc107', '#ff9800', '#ff5722']
            },
            TYPES: ['shoe', 'medal', 'clock', 'cap', 'energy', 'watch'],
            EMOJI_MAP: { shoe: '👟', medal: '🏅', clock: '⏱️', cap: '🧢', energy: '⚡', watch: '⌚' },
            ITEM_SIZE: 56, TARGET_DISTANCE: 42.195, INITIAL_TIME: 480, TOTAL_PAIRS: 40 
        };

        class Particle {
            constructor(x, y, color, isConfetti = false) {
                this.x = x; this.y = y;
                this.isConfetti = isConfetti;
                const angle = Math.random() * Math.PI * 2;
                const speed = isConfetti ? (Math.random() * 12 + 5) : (Math.random() * 8 + 4);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.gravity = isConfetti ? 0.2 : 0.15;
                this.life = 1.0;
                this.decay = isConfetti ? (Math.random() * 0.01 + 0.005) : 0.025;
                this.color = color;
                this.size = Math.random() * (isConfetti ? 8 : 5) + 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.vr = (Math.random() - 0.5) * (isConfetti ? 0.5 : 0.3);
            }
            update() {
                this.vx *= 0.98; this.vy *= 0.98; this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy; this.rotation += this.vr;
                this.life -= this.decay;
            }
            draw(ctx) {
                ctx.save(); ctx.globalAlpha = this.life;
                ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                ctx.fillStyle = this.color;
                if (this.isConfetti) {
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size/2);
                } else {
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                }
                ctx.restore();
            }
        }

        class Sprite {
            constructor(type, x, y, z) {
                this.type = type; this.x = x; this.y = y; this.z = z;
                this.size = CONFIG.ITEM_SIZE; this.isMatched = false;
                this.isClickable = false; this.scale = 1; this.glow = 0;
            }
            draw(ctx) {
                ctx.save();
                const depth = this.z * 1.5;
                ctx.translate(this.x + this.size/2 + depth, this.y + this.size/2 - depth);
                ctx.scale(this.scale, this.scale);
                ctx.translate(-this.size/2, -this.size/2);
                if (this.glow > 0) { ctx.shadowColor = CONFIG.COLORS.neon; ctx.shadowBlur = 25; this.glow -= 0.02; }
                else if (this.isClickable) { ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 12; }
                ctx.fillStyle = this.isClickable ? '#252930' : '#121417';
                ctx.strokeStyle = this.isClickable ? (this.glow > 0.1 ? '#FFF' : CONFIG.COLORS.neon) : '#333';
                ctx.lineWidth = 2.5; ctx.globalAlpha = this.isClickable ? 1 : 0.4;
                ctx.beginPath(); ctx.roundRect(0, 0, this.size, this.size, 8); ctx.fill(); ctx.stroke();
                ctx.globalAlpha = this.isClickable ? 1 : 0.3;
                ctx.font = `${Math.floor(this.size * 0.6)}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(CONFIG.EMOJI_MAP[this.type], this.size/2, this.size/2 + 2);
                ctx.restore();
            }
        }

        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.sprites = []; this.particles = [];
                this.distance = 0; this.timeLeft = CONFIG.INITIAL_TIME;
                this.stage = 0; this.isRunning = false; this.isCelebrating = false;
                this.inventory = { gel: 10, gps: 10, shuffle: 99 };
                this.selected = null; this.distPerPair = CONFIG.TARGET_DISTANCE / CONFIG.TOTAL_PAIRS;
                this.initCanvas();
                window.addEventListener('resize', () => this.initCanvas());
                this.canvas.addEventListener('pointerdown', (e) => this.handleInput(e));
                this.showOverlay("READY?", "点击下方按钮开始全马挑战");
            }
            initCanvas() {
                const container = document.getElementById('game-container');
                this.canvas.width = Math.min(container.clientWidth, 500);
                this.canvas.height = Math.min(container.clientHeight, 700);
            }
            start() {
                this.distance = 0; this.stage = 0; this.timeLeft = CONFIG.INITIAL_TIME;
                this.inventory = { gel: 10, gps: 10, shuffle: 99 };
                this.selected = null; this.isCelebrating = false;
                this.particles = []; this.nextStage(); this.isRunning = true;
                this.lastTime = performance.now(); this.animate();
                document.getElementById('overlay').style.display = 'none'; this.updateUI();
            }
            nextStage() {
                const stages = ["外滩段", "南浦大桥段", "西岸段", "上海体育场段"];
                document.getElementById('stage-name').innerText = `当前赛段：${stages[this.stage]}`;
                this.generateLevel(this.stage); this.stage++;
            }
            generateLevel(stageNum) {
                this.sprites = [];
                const pairs = 7 + stageNum * 2;
                const pool = [];
                for(let i=0; i<pairs; i++) {
                    const type = CONFIG.TYPES[i % CONFIG.TYPES.length];
                    pool.push(type, type);
                }
                pool.sort(() => Math.random() - 0.5);
                const cx = this.canvas.width/2, cy = this.canvas.height/2;
                pool.forEach((type, i) => {
                    this.sprites.push(new Sprite(type, cx+(Math.random()-0.5)*350-28, cy+(Math.random()-0.5)*450-28, Math.floor(i/4)+Math.random()*0.1));
                });
                this.updateClickable();
            }
            updateClickable() {
                this.sprites.forEach((a, i) => {
                    if (a.isMatched) return;
                    let blocked = false;
                    for (let j = 0; j < this.sprites.length; j++) {
                        const b = this.sprites[j];
                        if (i !== j && !b.isMatched && (b.z > a.z || (Math.abs(b.z-a.z)<0.01 && j > i))) {
                            if (!(a.x+a.size < b.x || a.x > b.x+b.size || a.y+a.size < b.y || a.y > b.y+b.size)) {
                                blocked = true; break;
                            }
                        }
                    }
                    a.isClickable = !blocked;
                });
            }
            handleInput(e) {
                if (!this.isRunning) return;
                const rect = this.canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                let target = null;
                for (let i = this.sprites.length - 1; i >= 0; i--) {
                    const s = this.sprites[i];
                    if (s.isMatched) continue;
                    if (s.isClickable || (this.selected && s.type === this.selected.type)) {
                        if (mx > s.x && mx < s.x + s.size && my > s.y && my < s.y + s.size) {
                            if (this.selected && s.type === this.selected.type && s !== this.selected) { target = s; break; }
                            if (!target) target = s;
                        }
                    }
                }
                if (target) this.onSpriteClick(target);
            }
            onSpriteClick(s) {
                if (!this.selected) { this.selected = s; s.scale = 1.25; }
                else if (this.selected === s) { s.scale = 1; this.selected = null; }
                else {
                    if (this.selected.type === s.type) { this.match(this.selected, s); this.selected = null; }
                    else if (s.isClickable) { this.selected.scale = 1; this.selected = s; s.scale = 1.25; }
                }
            }
            match(s1, s2) {
                for(let i=0; i<30; i++) {
                    this.particles.push(new Particle(s1.x+28, s1.y+28, CONFIG.COLORS.neon));
                    this.particles.push(new Particle(s2.x+28, s2.y+28, CONFIG.COLORS.white));
                }
                s1.isMatched = s2.isMatched = true;
                this.distance += this.distPerPair; this.updateClickable(); this.checkFinish();
            }
            checkFinish() {
                if (this.sprites.every(s => s.isMatched)) {
                    if (this.stage < 4) setTimeout(() => this.nextStage(), 500);
                    else { this.distance = 42.195; this.finishRace(); }
                }
            }
            finishRace() {
                this.isRunning = false;
                this.isCelebrating = true;
                // 触发终点大礼炮
                for(let i=0; i<150; i++) {
                    this.particles.push(new Particle(this.canvas.width/2, this.canvas.height + 20, CONFIG.COLORS.confetti[Math.floor(Math.random()*CONFIG.COLORS.confetti.length)], true));
                }
                const ut = CONFIG.INITIAL_TIME - this.timeLeft;
                document.getElementById('final-time').innerText = `${Math.floor(ut/60)}:${Math.floor(ut%60).toString().padStart(2,'0')}`;
                document.getElementById('start-btn').innerText = "挑战更高成绩";
                setTimeout(() => { document.getElementById('overlay').style.display = 'flex'; }, 1000);
            }
            useGel() {
                if (this.inventory.gel <= 0) return;
                const targets = this.sprites.filter(s => s.type === 'clock' && !s.isMatched);
                if (targets.length === 0) return;
                targets.forEach(t => { t.isMatched = true; for(let i=0; i<15; i++) this.particles.push(new Particle(t.x+28, t.y+28, '#FFD700')); });
                this.distance += (targets.length/2)*this.distPerPair; this.inventory.gel--; this.updateUI(); this.updateClickable(); this.checkFinish();
            }
            useGPS() {
                if (this.inventory.gps <= 0) return;
                const clickable = this.sprites.filter(s => s.isClickable && !s.isMatched);
                for(let i=0; i<clickable.length; i++) {
                    for(let j=i+1; j<clickable.length; j++) {
                        if (clickable[i].type === clickable[j].type) { clickable[i].glow = 2; clickable[j].glow = 2; this.inventory.gps--; this.updateUI(); return; }
                    }
                }
            }
            useShuffle() {
                if (this.inventory.shuffle <= 0) return;
                const left = this.sprites.filter(s => !s.isMatched);
                const types = left.map(s => s.type).sort(() => Math.random()-0.5);
                left.forEach((s, i) => s.type = types[i]);
                this.inventory.shuffle--; this.updateClickable(); this.updateUI();
            }
            updateUI() {
                document.getElementById('count-gel').innerText = this.inventory.gel;
                document.getElementById('count-gps').innerText = this.inventory.gps;
                document.getElementById('count-shuffle').innerText = this.inventory.shuffle;
            }
            update(dt) {
                if (!this.isRunning && !this.isCelebrating) return;
                if (this.isRunning) this.timeLeft -= dt/1000;
                if (this.timeLeft <= 0) { this.isRunning = false; this.showOverlay("DNF", "很遗憾未能在关门时间内完赛"); }
                const d = Math.min(this.distance, 42.195);
                document.getElementById('score').innerText = d.toFixed(3);
                const m = Math.floor(this.timeLeft/60), s = Math.floor(this.timeLeft%60);
                document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                document.getElementById('progress-bar').style.width = `${(d/42.195)*100}%`;
                for(let i=this.particles.length-1; i>=0; i--) { this.particles[i].update(); if (this.particles[i].life<=0) this.particles.splice(i,1); }
                if (this.isCelebrating && this.particles.length < 50) { // 持续撒花
                    this.particles.push(new Particle(Math.random()*this.canvas.width, this.canvas.height+10, CONFIG.COLORS.confetti[Math.floor(Math.random()*CONFIG.COLORS.confetti.length)], true));
                }
            }
            render() {
                this.ctx.fillStyle = CONFIG.COLORS.deep; this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                const sorted = [...this.sprites].sort((a,b) => a.z - b.z);
                sorted.forEach(s => { if (!s.isMatched) s.draw(this.ctx); });
                this.particles.forEach(p => p.draw(this.ctx));
            }
            animate() {
                const now = performance.now(); this.update(now - this.lastTime);
                this.render(); this.lastTime = now;
                if (this.isRunning || this.isCelebrating) requestAnimationFrame(() => this.animate());
            }
            showOverlay(title, msg) {
                const overlay = document.getElementById('overlay');
                document.getElementById('overlay-title').innerText = title;
                document.getElementById('overlay-msg').innerHTML = `<p>${msg}</p>`;
                overlay.style.display = 'flex';
            }
        }
        const game = new Game();
    </script>
</body>
</html>
