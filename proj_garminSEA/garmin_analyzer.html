<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garmin 跑步数据分析助手 v2.4 (精简版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <style>
        :root {
            --primary-color: #007aff;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-muted: #666;
            --border-color: #e1e4e8;
            --summary-bg: #f8f9fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { color: var(--primary-color); margin-bottom: 10px; }

        .upload-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border: 2px dashed var(--border-color);
            margin-bottom: 30px;
        }

        #fileInput { display: none; }
        .upload-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            display: inline-block;
        }

        .table-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th, td {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        th { background-color: #f8f9fa; font-weight: 600; }

        .summary-row {
            background-color: var(--summary-bg);
            font-weight: bold;
        }

        .charts-stack {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
        }

        .chart-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: 500px;
            width: 100%;
            box-sizing: border-box;
        }

        .chart-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-main);
            border-left: 5px solid var(--primary-color);
            padding-left: 12px;
        }

        .chart-container {
            width: 100%;
            height: 400px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Garmin 跑步数据分析</h1>
        <p style="color: var(--text-muted)">精简版：舍弃 0.1s 小数点，视觉更清爽</p>
    </header>

    <div class="upload-section">
        <label for="fileInput" class="upload-btn">选择 CSV 文件</label>
        <input type="file" id="fileInput" accept=".csv">
        <p id="fileName" style="margin-top: 10px; color: var(--text-muted)">提示：图表支持滑块缩放和鼠标滚动缩放</p>
    </div>

    <div id="resultArea" class="hidden">
        <div class="table-card">
            <div class="chart-title">数据明细与统计</div>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>计圈</th>
                        <th>累计时间</th>
                        <th>平均配速</th>
                        <th>平均心率</th>
                        <th>最大心率</th>
                        <th>累计爬升</th>
                        <th>平均步频</th>
                        <th>平均步长</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="charts-stack">
            <div class="chart-card">
                <div class="chart-title">平均步长分布趋势 (m)</div>
                <div id="strideChart" class="chart-container"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">平均心率分布趋势 (bpm)</div>
                <div id="hrChart" class="chart-container"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">平均配速分布趋势 (MM:SS)</div>
                <div id="paceChart" class="chart-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileName');
    const resultArea = document.getElementById('resultArea');
    const tableBody = document.querySelector('#dataTable tbody');
    let charts = [];

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        fileNameDisplay.textContent = `已选择: ${file.name}`;
        Papa.parse(file, {
            header: true, skipEmptyLines: true,
            complete: function(results) { processData(results.data); }
        });
    });

    function processData(rawData) {
        const lapsData = [];
        const summaryRows = [];

        rawData.forEach(row => {
            const lapVal = String(row["计圈"] || "").trim();
            if (!lapVal) return;
            if (!isNaN(parseInt(lapVal))) {
                lapsData.push(mapRow(row, false));
            } else {
                summaryRows.push(mapRow(row, true));
            }
        });

        resultArea.classList.remove('hidden');
        renderTable([...lapsData, ...summaryRows]);

        const strideDist = getFrequency(lapsData.map(r => r.avgStride.toFixed(2)));
        const hrDist = getFrequency(lapsData.map(r => r.avgHR));
        const paceDist = getFrequency(lapsData.map(r => r.avgPace));

        renderCharts(strideDist, hrDist, paceDist);
    }

    function mapRow(row, isSummary) {
        // 对累计时间进行切分，去掉小数点部分
        let rawTime = row["累积时间"] || "--";
        let cleanTime = rawTime.split('.')[0]; 

        return {
            isSummary: isSummary,
            lap: row["计圈"],
            totalTime: cleanTime,
            avgPace: formatPace(row["平均配速分钟/千米"]),
            avgHR: parseInt(row["平均心率bpm"]) || 0,
            maxHR: parseInt(row["最大心率bpm"]) || 0,
            climb: row["累计爬升米"] || "0",
            avgCadence: row["平均步频每分钟步数"] || "0",
            avgStride: parseFloat(row["平均步长米"]) || 0
        };
    }

    /**
     * 配速格式化逻辑：仅保留 MM:SS，舍弃 0.1s
     */
    function formatPace(paceStr) {
        let target = (paceStr || "").trim() || "0:00";
        // 移除小数点及其后内容
        target = target.split('.')[0];
        
        const parts = target.split(':');
        if (parts.length === 2) {
            let min = parts[0].padStart(2, '0');
            let sec = parts[1].padStart(2, '0');
            return `${min}:${sec}`;
        }
        return target;
    }

    function getFrequency(arr) {
        const counts = {};
        arr.forEach(val => { counts[val] = (counts[val] || 0) + 1; });
        return Object.keys(counts).map(key => ({ value: key, count: counts[key] }))
            .sort((a, b) => isNaN(a.value) ? String(a.value).localeCompare(b.value) : parseFloat(a.value) - parseFloat(b.value));
    }

    function renderTable(data) {
        tableBody.innerHTML = '';
        data.forEach(row => {
            const tr = document.createElement('tr');
            if (row.isSummary) tr.className = 'summary-row';
            tr.innerHTML = `
                <td>${row.lap}</td>
                <td>${row.totalTime}</td>
                <td>${row.avgPace}</td>
                <td>${row.avgHR || '--'}</td>
                <td>${row.maxHR || '--'}</td>
                <td>${row.climb}</td>
                <td>${row.avgCadence}</td>
                <td>${row.avgStride.toFixed(2)}</td>
            `;
            tableBody.appendChild(tr);
        });
    }

    function renderCharts(strideDist, hrDist, paceDist) {
        charts.forEach(c => c.dispose());
        charts = [];

        const commonOption = {
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            dataZoom: [
                { type: 'slider', start: 0, end: 100, bottom: 10 },
                { type: 'inside', start: 0, end: 100 }
            ],
            grid: { left: '4%', right: '4%', bottom: '80px', top: '40px', containLabel: true },
            yAxis: { type: 'value', name: '频数', splitLine: { lineStyle: { type: 'dashed' } } },
            series: [{
                type: 'bar',
                barMinWidth: 20,
                barMaxWidth: 60,
                label: { show: true, position: 'top' },
                itemStyle: { borderRadius: [5, 5, 0, 0] }
            }]
        };

        const createChart = (id, data, xName, color) => {
            const dom = document.getElementById(id);
            const chart = echarts.init(dom);
            chart.setOption({
                ...commonOption,
                xAxis: { 
                    type: 'category', 
                    data: data.map(d => d.value), 
                    name: xName,
                    axisLabel: { interval: 0, rotate: 30 }
                },
                series: [{ ...commonOption.series[0], data: data.map(d => d.count), itemStyle: { ...commonOption.series[0].itemStyle, color: color } }]
            });
            charts.push(chart);
        };

        createChart('strideChart', strideDist, '步长(m)', '#007aff');
        createChart('hrChart', hrDist, '心率(bpm)', '#ff3b30');
        createChart('paceChart', paceDist, '配速', '#34c759');
    }

    window.addEventListener('resize', () => charts.forEach(c => c.resize()));
</script>

</body>
</html>
