<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 掷骰子游戏</title>
    <style>
        :root {
            --dice-size: 100px;
            --dot-size: 18px;
            --dice-color: #fff;
            --dot-color: #333;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
        }

        .dice-box {
            display: flex;
            gap: 60px;
            margin-bottom: 50px;
            perspective: 1000px;
        }

        .dice {
            position: relative;
            width: var(--dice-size);
            height: var(--dice-size);
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .face {
            position: absolute;
            width: var(--dice-size);
            height: var(--dice-size);
            background: var(--dice-color);
            border: 2px solid #ddd;
            border-radius: 12px;
            display: grid;
            grid-template-areas:
                "a . b"
                "c d e"
                "f . g";
            padding: 10px;
            box-sizing: border-box;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
        }

        .dot {
            width: var(--dot-size);
            height: var(--dot-size);
            background: var(--dot-color);
            border-radius: 50%;
            align-self: center;
            justify-self: center;
        }

        /* 骰子 6 个面的点数布局 */
        .face[data-side="1"] .dot { grid-area: d; }
        .face[data-side="2"] .dot:nth-child(1) { grid-area: b; }
        .face[data-side="2"] .dot:nth-child(2) { grid-area: f; }
        .face[data-side="3"] .dot:nth-child(1) { grid-area: b; }
        .face[data-side="3"] .dot:nth-child(2) { grid-area: d; }
        .face[data-side="3"] .dot:nth-child(3) { grid-area: f; }
        .face[data-side="4"] .dot:nth-child(1) { grid-area: a; }
        .face[data-side="4"] .dot:nth-child(2) { grid-area: b; }
        .face[data-side="4"] .dot:nth-child(3) { grid-area: f; }
        .face[data-side="4"] .dot:nth-child(4) { grid-area: g; }
        .face[data-side="5"] .dot:nth-child(1) { grid-area: a; }
        .face[data-side="5"] .dot:nth-child(2) { grid-area: b; }
        .face[data-side="5"] .dot:nth-child(3) { grid-area: d; }
        .face[data-side="5"] .dot:nth-child(4) { grid-area: f; }
        .face[data-side="5"] .dot:nth-child(5) { grid-area: g; }
        .face[data-side="6"] .dot:nth-child(1) { grid-area: a; }
        .face[data-side="6"] .dot:nth-child(2) { grid-area: b; }
        .face[data-side="6"] .dot:nth-child(3) { grid-area: c; }
        .face[data-side="6"] .dot:nth-child(4) { grid-area: e; }
        .face[data-side="6"] .dot:nth-child(5) { grid-area: f; }
        .face[data-side="6"] .dot:nth-child(6) { grid-area: g; }

        /* 3D 面的位置 */
        .face:nth-child(1) { transform: rotateY(0deg) translateZ(50px); }
        .face:nth-child(2) { transform: rotateY(90deg) translateZ(50px); }
        .face:nth-child(3) { transform: rotateY(180deg) translateZ(50px); }
        .face:nth-child(4) { transform: rotateY(-90deg) translateZ(50px); }
        .face:nth-child(5) { transform: rotateX(90deg) translateZ(50px); }
        .face:nth-child(6) { transform: rotateX(-90deg) translateZ(50px); }

        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }

        .btn:hover { background: #ff6b81; transform: translateY(-2px); }
        .btn:active { transform: translateY(1px); }

        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            height: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎲 3D 掷骰子</h1>
    <div class="dice-box">
        <div id="dice1" class="dice">
            <div class="face" data-side="1"><div class="dot"></div></div>
            <div class="face" data-side="2"><div class="dot"></div><div class="dot"></div></div>
            <div class="face" data-side="3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="face" data-side="4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="face" data-side="5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="face" data-side="6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
        <div id="dice2" class="dice">
            <div class="face" data-side="1"><div class="dot"></div></div>
            <div class="face" data-side="2"><div class="dot"></div><div class="dot"></div></div>
            <div class="face" data-side="3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="face" data-side="4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="face" data-side="5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="face" data-side="6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
    </div>
    <button class="btn" onclick="rollDice()">投掷骰子！</button>
    <div id="result"></div>
</div>

<script>
    function rollDice() {
        const dice1 = document.getElementById('dice1');
        const dice2 = document.getElementById('dice2');
        const resultDiv = document.getElementById('result');
        
        resultDiv.textContent = '滚动中...';

        const side1 = Math.floor(Math.random() * 6) + 1;
        const side2 = Math.floor(Math.random() * 6) + 1;

        // 设置旋转动画 (增加随机圈数以增加真实感)
        applyRotation(dice1, side1);
        applyRotation(dice2, side2);

        setTimeout(() => {
            resultDiv.textContent = `结果: ${side1} + ${side2} = ${side1 + side2}`;
        }, 1200);
    }

    function applyRotation(dice, side) {
        // 每个面对应的旋转角度
        const rotations = {
            1: [0, 0],
            2: [0, -90],
            3: [0, -180],
            4: [0, 90],
            5: [-90, 0],
            6: [90, 0]
        };

        const extraRolls = 3; // 额外翻转的圈数
        const [x, y] = rotations[side];
        
        // 增加随机偏移让每次旋转都不完全一样
        const finalX = x + (Math.floor(Math.random() * 4) * 360) + (360 * extraRolls);
        const finalY = y + (Math.floor(Math.random() * 4) * 360) + (360 * extraRolls);

        dice.style.transform = `rotateX(${finalX}deg) rotateY(${finalY}deg)`;
    }

    // 初始显示
    rollDice();
</script>


</body>
</html>
